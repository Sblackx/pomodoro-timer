<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <style>
      :root{
        --current-color: gold;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: black;
      }
      .container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      svg {
        width: 100%;
        max-width: 600px;
      }
      .time {
        font: 80px sans-serif;
        fill: white;
      }

      circle {
        --strokeIncrement: 1;
        --strokeCalc: 0;
        stroke-dasharray: 1260;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 1s linear;
        stroke: var(--current-color);

        filter: drop-shadow(0 0 0.75rem var(--current-color));
      }
      .start-animation {
        animation: draw forwards;
        animation-duration: 1500s;
      }
      @keyframes draw {
        to {
          stroke-dashoffset: 1260;
        }
      }

      .Buttons {
        width: 100%;
        max-width: 600px;
        display: flex;
        justify-content: space-around;
      }
      .b {
        padding: 10px 30px;

        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .start {
        background-color: var(--current-color);
        box-shadow:
          inset 0 0 10px var(--current-color),
          0 0 20px var(--current-color);
      }
      .reset {
        background-color: darkgray;
        box-shadow:
          inset 0 0 10px darkgray,
          0 0 10px darkgray;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="time-wrapper" viewBox="0 0 500 500">
        <circle
          cx="250"
          cy="250"
          r="200"
          stroke-width="5"
          fill="transparent"
        />
        <text
          x="50%"
          y="50%"
          text-anchor="middle"
          dominant-baseline="middle"
          class="time"
          stroke="gold"
        >
          25:00
        </text>
      </svg>
      <div class="Buttons">
        <button class="b start">Start</button>
        <button class="b reset">Reset</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
